name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx expo export --platform web

      # PWA manifest link + theme color (expo export doesn't emit these),
      # SPA fallback, custom domain, and keep Jekyll away from _expo/
      - run: |
          sed -i 's|</head>|<link rel="manifest" href="/manifest.webmanifest" /><meta name="theme-color" content="#0F1420" /></head>|' dist/index.html
          cp dist/index.html dist/404.html
          echo "maintenance.thejumpvault.com" > dist/CNAME
          touch dist/.nojekyll

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
